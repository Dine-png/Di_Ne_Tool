name: Build Repo Listing

on:
  release:
    types: [published, created, edited, deleted]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Build index.json
        run: |
          mkdir -p Website
          
          pkg_name=$(jq -r '.name' Packages/com.dinetool.avatar-tools/package.json)
          pkg_display=$(jq -r '.displayName' Packages/com.dinetool.avatar-tools/package.json)
          pkg_version=$(jq -r '.version' Packages/com.dinetool.avatar-tools/package.json)
          zip_url="https://github.com/${{ github.repository }}/releases/download/${pkg_version}/${pkg_name}-${pkg_version}.zip"
          
          pkg=$(jq --arg url "$zip_url" '.url = $url' Packages/com.dinetool.avatar-tools/package.json)
          
          jq -n \
            --arg name "$pkg_display" \
            --arg author "Dine" \
            --arg url "https://Dine-png.github.io/Di_Ne_Tool/index.json" \
            --arg pkg_name "$pkg_name" \
            --arg version "$pkg_version" \
            --argjson pkg "$pkg" \
            '{name: $name, author: $author, url: $url, packages: {($pkg_name): {versions: {($version): $pkg}}}}' \
            > Website/index.json
          
          cat Website/index.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4